
x-superset-common: &superset-common
  image: apache/superset:latest
  env_file: ../../.env.dev
  environment:
    - SUPERSET_CONFIG_PATH=/app/superset_config.py
  volumes:
    - ../../superset/config/superset_config_dev.py:/app/superset_config.py:ro
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:15
    env_file: ../../.env.dev
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    <<: *superset-common
    ports:
      - "${SUPERSET_PORT}:8088"
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname Dev
          --email admin@dev.local
          --password admin &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads
      "

  superset-worker:
    <<: *superset-common
    command: celery --app=superset.tasks.celery_app:app worker --loglevel=info

  superset-beat:
    <<: *superset-common
    command: celery --app=superset.tasks.celery_app:app beat --loglevel=info
