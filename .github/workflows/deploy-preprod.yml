name: Deploy to Preprod

on:
  push:
    branches:
      - preprod

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/Desktop/superset-mastery/docker/preprod
          docker compose --env-file ../../.env.preprod up -d --build
