name: Deploy to Prod

on:
  push:
    branches:
      - preprod

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/Desktop/superset-mastery/docker/prod
          docker compose --env-file ../../.env.prod up -d --build

      - name: Import dashboards
        run: |
          cd ~/Desktop/superset-mastery
          for zip in dashboards/*.zip; do
            docker cp $zip prod-superset-1:/tmp/$(basename $zip) && \
            docker exec prod-superset-1 superset import-dashboards -p /tmp/$(basename $zip) -u admin
          done
