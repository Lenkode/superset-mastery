name: Deploy to Prod

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/Desktop/superset-mastery/docker/prod
          docker compose --env-file ../../.env.prod up -d --build

      - name: Import dashboards
        run: |
          cd ~/Desktop/superset-mastery
          for zip in dashboards/*.zip; do
            bash scripts/import_dashboard.sh prod-superset-1 $zip analyst
          done
